name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v3.0.0)'
        required: true
        default: 'v3.0.0'

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Linux x86_64 (native, using depends)
  # ---------------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config bsdmainutils curl

      - name: Cache depends
        uses: actions/cache@v4
        with:
          path: |
            divi/depends/built
            divi/depends/sources
          key: depends-x86_64-linux-gnu-${{ hashFiles('divi/depends/packages/*.mk') }}
          restore-keys: |
            depends-x86_64-linux-gnu-

      - name: Build depends
        run: make -C divi/depends HOST=x86_64-linux-gnu -j$(nproc)

      - name: Build PrivateDivi
        run: |
          cd divi
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/x86_64-linux-gnu/share/config.site ./configure \
            --enable-glibc-back-compat \
            --enable-reduce-exports \
            --disable-gui \
            --disable-tests \
            --disable-bench
          make -j$(nproc)

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Package binaries
        run: |
          VERSION=${{ steps.version.outputs.version }}
          DIR="privatedivi-${VERSION}-x86_64-linux-gnu"
          mkdir -p "${DIR}"
          cp divi/src/privatedivid "${DIR}/"
          cp divi/src/privatedivi-cli "${DIR}/"
          cp divi/src/privatedivi-tx "${DIR}/"
          strip "${DIR}/privatedivid"
          strip "${DIR}/privatedivi-cli"
          strip "${DIR}/privatedivi-tx"
          tar -czvf "privatedivi-${VERSION}-x86_64-linux-gnu.tar.gz" "${DIR}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: privatedivi-x86_64-linux-gnu
          path: privatedivi-${{ steps.version.outputs.version }}-x86_64-linux-gnu.tar.gz

  # ---------------------------------------------------------------------------
  # Windows x64 (cross-compile with MinGW on Ubuntu)
  # ---------------------------------------------------------------------------
  build-windows:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools and MinGW
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config bsdmainutils curl \
            g++-mingw-w64-x86-64
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix

      - name: Cache depends
        uses: actions/cache@v4
        with:
          path: |
            divi/depends/built
            divi/depends/sources
          key: depends-x86_64-w64-mingw32-${{ hashFiles('divi/depends/packages/*.mk') }}
          restore-keys: |
            depends-x86_64-w64-mingw32-

      - name: Build depends
        run: make -C divi/depends HOST=x86_64-w64-mingw32 -j$(nproc)

      - name: Build PrivateDivi
        run: |
          cd divi
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site ./configure \
            --enable-reduce-exports \
            --disable-gui \
            --disable-tests \
            --disable-bench
          make -j$(nproc)

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Package binaries
        run: |
          VERSION=${{ steps.version.outputs.version }}
          DIR="privatedivi-${VERSION}-win64"
          mkdir -p "${DIR}"
          cp divi/src/privatedivid.exe "${DIR}/"
          cp divi/src/privatedivi-cli.exe "${DIR}/"
          cp divi/src/privatedivi-tx.exe "${DIR}/"
          x86_64-w64-mingw32-strip "${DIR}/privatedivid.exe"
          x86_64-w64-mingw32-strip "${DIR}/privatedivi-cli.exe"
          x86_64-w64-mingw32-strip "${DIR}/privatedivi-tx.exe"
          zip -r "privatedivi-${VERSION}-win64.zip" "${DIR}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: privatedivi-win64
          path: privatedivi-${{ steps.version.outputs.version }}-win64.zip

  # ---------------------------------------------------------------------------
  # macOS ARM64 (native build, all deps static from source)
  # ---------------------------------------------------------------------------
  build-macos:
    runs-on: macos-15
    env:
      DEPS_PREFIX: /usr/local
      NPROC_CMD: "sysctl -n hw.logicalcpu"
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install automake libtool pkg-config

      - name: Build OpenSSL 1.1.1w (static)
        run: |
          curl -fL https://www.openssl.org/source/openssl-1.1.1w.tar.gz -o openssl.tar.gz
          tar xzf openssl.tar.gz
          cd openssl-1.1.1w
          ./Configure darwin64-arm64-cc no-shared --prefix=$DEPS_PREFIX
          make -j$($NPROC_CMD)
          sudo make install_sw

      - name: Build BDB 4.8.30 (static)
        run: |
          curl -fL http://download.oracle.com/berkeley-db/db-4.8.30.NC.tar.gz -o bdb.tar.gz
          tar xzf bdb.tar.gz
          cd db-4.8.30.NC
          sed -i '' 's/__atomic_compare_exchange/__atomic_compare_exchange_db/' dbinc/atomic.h
          sed -i '' 's/atomic_init/atomic_init_db/' dbinc/atomic.h mp/mp_region.c mp/mp_mvcc.c mp/mp_fget.c mutex/mut_method.c mutex/mut_tas.c
          cd build_unix
          ../dist/configure --prefix=$DEPS_PREFIX --disable-shared --enable-cxx --with-pic \
            CFLAGS="-Wno-implicit-function-declaration" CXXFLAGS="-std=c++11"
          make -j$($NPROC_CMD)
          sudo make install

      - name: Build Boost 1.76 (static)
        run: |
          curl -fL https://archives.boost.io/release/1.76.0/source/boost_1_76_0.tar.gz -o boost.tar.gz
          tar xzf boost.tar.gz
          cd boost_1_76_0
          ./bootstrap.sh --prefix=$DEPS_PREFIX
          sudo ./b2 --with-system --with-filesystem --with-program_options --with-thread --with-chrono \
            cxxflags="-Wno-deprecated-declarations -Wno-enum-constexpr-conversion" \
            link=static threading=multi -j$($NPROC_CMD) install

      - name: Build libevent 2.1.12 (static)
        run: |
          curl -fL https://github.com/libevent/libevent/releases/download/release-2.1.12-stable/libevent-2.1.12-stable.tar.gz -o libevent.tar.gz
          tar xzf libevent.tar.gz
          cd libevent-2.1.12-stable
          ./configure --prefix=$DEPS_PREFIX --disable-shared --enable-static --with-pic \
            --disable-samples --disable-libevent-regress \
            CPPFLAGS="-I$DEPS_PREFIX/include" LDFLAGS="-L$DEPS_PREFIX/lib"
          make -j$($NPROC_CMD)
          sudo make install

      - name: Build ZeroMQ 4.3.5 (static)
        run: |
          curl -fL https://github.com/zeromq/libzmq/releases/download/v4.3.5/zeromq-4.3.5.tar.gz -o zeromq.tar.gz
          tar xzf zeromq.tar.gz
          cd zeromq-4.3.5
          ./configure --prefix=$DEPS_PREFIX --disable-shared --enable-static --with-pic --without-docs \
            --disable-Werror
          make -j$($NPROC_CMD)
          sudo make install

      - name: Build miniupnpc 2.0.20170509 (static)
        run: |
          curl -fL http://miniupnp.free.fr/files/miniupnpc-2.0.20170509.tar.gz -o miniupnpc.tar.gz
          tar xzf miniupnpc.tar.gz
          cd miniupnpc-2.0.20170509
          mkdir -p dll
          sed -e 's|MINIUPNPC_VERSION_STRING "version"|MINIUPNPC_VERSION_STRING "2.0.20170509"|' \
              -e 's|OS/version|Darwin/arm64|' miniupnpcstrings.h.in > miniupnpcstrings.h
          make libminiupnpc.a CC=cc OS=Darwin
          sudo mkdir -p $DEPS_PREFIX/include/miniupnpc $DEPS_PREFIX/lib
          sudo install *.h $DEPS_PREFIX/include/miniupnpc/
          sudo install libminiupnpc.a $DEPS_PREFIX/lib/

      - name: Build PrivateDivi
        run: |
          cd divi
          ./autogen.sh
          ./configure \
            --disable-gui \
            --disable-tests \
            --disable-bench \
            --with-unsupported-ssl \
            --with-boost=$DEPS_PREFIX \
            --with-boost-libdir=$DEPS_PREFIX/lib \
            LDFLAGS="-L$DEPS_PREFIX/lib" \
            CPPFLAGS="-I$DEPS_PREFIX/include" \
            CXXFLAGS="-Wno-deprecated-declarations -Wno-enum-constexpr-conversion"
          make -j$($NPROC_CMD)

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Verify static linking
        run: |
          echo "=== privatedivid dependencies ==="
          otool -L divi/src/privatedivid
          echo ""
          echo "=== privatedivi-cli dependencies ==="
          otool -L divi/src/privatedivi-cli
          echo ""
          echo "=== Checking for non-system dynamic libs ==="
          if otool -L divi/src/privatedivid | grep -v '/usr/lib/' | grep -v '/System/' | grep -v 'divi/src/' | grep -q '.dylib'; then
            echo "WARNING: Found non-system dynamic libraries!"
            otool -L divi/src/privatedivid | grep -v '/usr/lib/' | grep -v '/System/' | grep -v 'divi/src/'
          else
            echo "OK: All dependencies are system libraries or statically linked"
          fi

      - name: Package binaries
        run: |
          VERSION=${{ steps.version.outputs.version }}
          DIR="privatedivi-${VERSION}-osx-arm64"
          mkdir -p "${DIR}"
          cp divi/src/privatedivid "${DIR}/"
          cp divi/src/privatedivi-cli "${DIR}/"
          cp divi/src/privatedivi-tx "${DIR}/"
          strip "${DIR}/privatedivid"
          strip "${DIR}/privatedivi-cli"
          strip "${DIR}/privatedivi-tx"
          tar -czvf "privatedivi-${VERSION}-osx-arm64.tar.gz" "${DIR}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: privatedivi-osx-arm64
          path: privatedivi-${{ steps.version.outputs.version }}-osx-arm64.tar.gz

  # ---------------------------------------------------------------------------
  # ARM (Raspberry Pi 2+, cross-compile on Ubuntu)
  # ---------------------------------------------------------------------------
  build-arm:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools and ARM cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config bsdmainutils curl \
            g++-arm-linux-gnueabihf

      - name: Cache depends
        uses: actions/cache@v4
        with:
          path: |
            divi/depends/built
            divi/depends/sources
          key: depends-arm-linux-gnueabihf-${{ hashFiles('divi/depends/packages/*.mk') }}
          restore-keys: |
            depends-arm-linux-gnueabihf-

      - name: Build depends
        run: make -C divi/depends HOST=arm-linux-gnueabihf -j$(nproc)

      - name: Build PrivateDivi
        run: |
          cd divi
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/arm-linux-gnueabihf/share/config.site ./configure \
            --enable-glibc-back-compat \
            --enable-reduce-exports \
            --disable-gui \
            --disable-tests \
            --disable-bench
          make -j$(nproc)

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Package binaries
        run: |
          VERSION=${{ steps.version.outputs.version }}
          DIR="privatedivi-${VERSION}-RPi2"
          mkdir -p "${DIR}"
          cp divi/src/privatedivid "${DIR}/"
          cp divi/src/privatedivi-cli "${DIR}/"
          cp divi/src/privatedivi-tx "${DIR}/"
          arm-linux-gnueabihf-strip "${DIR}/privatedivid"
          arm-linux-gnueabihf-strip "${DIR}/privatedivi-cli"
          arm-linux-gnueabihf-strip "${DIR}/privatedivi-tx"
          tar -czvf "privatedivi-${VERSION}-RPi2.tar.gz" "${DIR}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: privatedivi-RPi2
          path: privatedivi-${{ steps.version.outputs.version }}-RPi2.tar.gz

  # ---------------------------------------------------------------------------
  # Create GitHub Release (runs only on tag push, after all builds succeed)
  # ---------------------------------------------------------------------------
  create-release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos, build-arm]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/privatedivi-x86_64-linux-gnu/*.tar.gz
            artifacts/privatedivi-win64/*.zip
            artifacts/privatedivi-osx-arm64/*.tar.gz
            artifacts/privatedivi-RPi2/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
