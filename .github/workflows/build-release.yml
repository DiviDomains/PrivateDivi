name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v3.0.0)'
        required: true
        default: 'v3.0.0'

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Linux x86_64 (native, using depends)
  # ---------------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config bsdmainutils curl

      - name: Cache depends
        uses: actions/cache@v4
        with:
          path: |
            divi/depends/built
            divi/depends/sources
          key: depends-x86_64-linux-gnu-${{ hashFiles('divi/depends/packages/*.mk') }}
          restore-keys: |
            depends-x86_64-linux-gnu-

      - name: Build depends
        run: make -C divi/depends HOST=x86_64-linux-gnu -j$(nproc)

      - name: Build PrivateDivi
        run: |
          cd divi
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/x86_64-linux-gnu/share/config.site ./configure \
            --enable-glibc-back-compat \
            --enable-reduce-exports \
            --disable-gui \
            --disable-tests \
            --disable-bench
          make -j$(nproc)

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Package binaries
        run: |
          VERSION=${{ steps.version.outputs.version }}
          DIR="privatedivi-${VERSION}-x86_64-linux-gnu"
          mkdir -p "${DIR}"
          cp divi/src/privatedivid "${DIR}/"
          cp divi/src/privatedivi-cli "${DIR}/"
          cp divi/src/privatedivi-tx "${DIR}/"
          strip "${DIR}/privatedivid"
          strip "${DIR}/privatedivi-cli"
          strip "${DIR}/privatedivi-tx"
          tar -czvf "privatedivi-${VERSION}-x86_64-linux-gnu.tar.gz" "${DIR}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: privatedivi-x86_64-linux-gnu
          path: privatedivi-${{ steps.version.outputs.version }}-x86_64-linux-gnu.tar.gz

  # ---------------------------------------------------------------------------
  # Windows x64 (cross-compile with MinGW on Ubuntu)
  # ---------------------------------------------------------------------------
  build-windows:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools and MinGW
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config bsdmainutils curl \
            g++-mingw-w64-x86-64
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix

      - name: Cache depends
        uses: actions/cache@v4
        with:
          path: |
            divi/depends/built
            divi/depends/sources
          key: depends-x86_64-w64-mingw32-${{ hashFiles('divi/depends/packages/*.mk') }}
          restore-keys: |
            depends-x86_64-w64-mingw32-

      - name: Build depends
        run: make -C divi/depends HOST=x86_64-w64-mingw32 -j$(nproc)

      - name: Build PrivateDivi
        run: |
          cd divi
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site ./configure \
            --enable-reduce-exports \
            --disable-gui \
            --disable-tests \
            --disable-bench
          make -j$(nproc)

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Package binaries
        run: |
          VERSION=${{ steps.version.outputs.version }}
          DIR="privatedivi-${VERSION}-win64"
          mkdir -p "${DIR}"
          cp divi/src/privatedivid.exe "${DIR}/"
          cp divi/src/privatedivi-cli.exe "${DIR}/"
          cp divi/src/privatedivi-tx.exe "${DIR}/"
          x86_64-w64-mingw32-strip "${DIR}/privatedivid.exe"
          x86_64-w64-mingw32-strip "${DIR}/privatedivi-cli.exe"
          x86_64-w64-mingw32-strip "${DIR}/privatedivi-tx.exe"
          zip -r "privatedivi-${VERSION}-win64.zip" "${DIR}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: privatedivi-win64
          path: privatedivi-${{ steps.version.outputs.version }}-win64.zip

  # ---------------------------------------------------------------------------
  # macOS ARM64 (native build using depends system on Apple Silicon)
  # ---------------------------------------------------------------------------
  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          brew install automake libtool pkg-config

      - name: Cache depends
        uses: actions/cache@v4
        with:
          path: |
            divi/depends/built
            divi/depends/sources
          key: depends-macos-arm64-${{ hashFiles('divi/depends/packages/*.mk') }}
          restore-keys: |
            depends-macos-arm64-

      - name: Build depends
        run: |
          HOST=$(divi/depends/config.guess)
          echo "HOST=${HOST}" >> $GITHUB_ENV
          make -C divi/depends HOST=${HOST} -j$(sysctl -n hw.logicalcpu)

      - name: Build PrivateDivi
        run: |
          cd divi
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/${HOST}/share/config.site ./configure \
            --disable-gui \
            --disable-tests \
            --disable-bench
          make -j$(sysctl -n hw.logicalcpu)

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Package binaries
        run: |
          VERSION=${{ steps.version.outputs.version }}
          DIR="privatedivi-${VERSION}-osx-arm64"
          mkdir -p "${DIR}"
          cp divi/src/privatedivid "${DIR}/"
          cp divi/src/privatedivi-cli "${DIR}/"
          cp divi/src/privatedivi-tx "${DIR}/"
          strip "${DIR}/privatedivid"
          strip "${DIR}/privatedivi-cli"
          strip "${DIR}/privatedivi-tx"
          tar -czvf "privatedivi-${VERSION}-osx-arm64.tar.gz" "${DIR}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: privatedivi-osx-arm64
          path: privatedivi-${{ steps.version.outputs.version }}-osx-arm64.tar.gz

  # ---------------------------------------------------------------------------
  # ARM (Raspberry Pi 2+, cross-compile on Ubuntu)
  # ---------------------------------------------------------------------------
  build-arm:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools and ARM cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config bsdmainutils curl \
            g++-arm-linux-gnueabihf

      - name: Cache depends
        uses: actions/cache@v4
        with:
          path: |
            divi/depends/built
            divi/depends/sources
          key: depends-arm-linux-gnueabihf-${{ hashFiles('divi/depends/packages/*.mk') }}
          restore-keys: |
            depends-arm-linux-gnueabihf-

      - name: Build depends
        run: make -C divi/depends HOST=arm-linux-gnueabihf -j$(nproc)

      - name: Build PrivateDivi
        run: |
          cd divi
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/arm-linux-gnueabihf/share/config.site ./configure \
            --enable-glibc-back-compat \
            --enable-reduce-exports \
            --disable-gui \
            --disable-tests \
            --disable-bench
          make -j$(nproc)

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Package binaries
        run: |
          VERSION=${{ steps.version.outputs.version }}
          DIR="privatedivi-${VERSION}-RPi2"
          mkdir -p "${DIR}"
          cp divi/src/privatedivid "${DIR}/"
          cp divi/src/privatedivi-cli "${DIR}/"
          cp divi/src/privatedivi-tx "${DIR}/"
          arm-linux-gnueabihf-strip "${DIR}/privatedivid"
          arm-linux-gnueabihf-strip "${DIR}/privatedivi-cli"
          arm-linux-gnueabihf-strip "${DIR}/privatedivi-tx"
          tar -czvf "privatedivi-${VERSION}-RPi2.tar.gz" "${DIR}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: privatedivi-RPi2
          path: privatedivi-${{ steps.version.outputs.version }}-RPi2.tar.gz

  # ---------------------------------------------------------------------------
  # Create GitHub Release (runs only on tag push, after all builds succeed)
  # ---------------------------------------------------------------------------
  create-release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos, build-arm]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/privatedivi-x86_64-linux-gnu/*.tar.gz
            artifacts/privatedivi-win64/*.zip
            artifacts/privatedivi-osx-arm64/*.tar.gz
            artifacts/privatedivi-RPi2/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
